name: fe_asrp_app
description: "BMC Phở Express - Nền tảng nhà hàng thông minh"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.0

  # State Management (Riverpod - tương đương Redux Toolkit)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Network (tương đương Axios + interceptors)
  dio: ^5.4.3+1

  # Google Fonts (Be Vietnam Pro)
  google_fonts: ^6.2.1

  # Icons (Feather Icons - tương đương react-icons/fi)
  feather_icons: ^1.2.0

  # Carousel (tương đương Ant Design Carousel)
  carousel_slider: ^5.0.0

  # Smooth page indicator (cho carousel dots)
  smooth_page_indicator: ^1.1.0

  # Cached network image
  cached_network_image: ^3.3.1

  # Shimmer loading skeleton
  shimmer: ^3.0.0

  # Secure storage (thay thế httpOnly cookie + localStorage)
  flutter_secure_storage: ^9.2.2

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4

  # Google Sign In
  google_sign_in: ^6.2.1

  # Charts (tương đương echarts)
  fl_chart: ^0.68.0

  # Cupertino icons
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  geolocator: ^14.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  background_image: "assets/logo.png"
  fullscreen: true
  android_12:
    color: "#D84315"
    image: "assets/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo.png
